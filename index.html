<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel app-header" aria-labelledby="app-title">
        <div>
          <p class="eyebrow">Personal finance</p>
          <h1 id="app-title">Expense Tracker</h1>
        </div>
        <div class="summary-card" aria-live="polite">
          <span>Total expenses</span>
          <strong>GH&#8373;<span id="total-amount">0.00</span></strong>
        </div>
      </section>

      <section class="panel" aria-labelledby="form-title">
        <div class="section-heading">
          <h2 id="form-title">Add expense</h2>
          <p>Track name, amount, category, and date.</p>
        </div>

        <form id="expense-form" novalidate>
          <div class="field">
            <label for="expense-name">Expense name</label>
            <input
              type="text"
              id="expense-name"
              name="name"
              placeholder="Groceries"
              autocomplete="off"
              required
            />
          </div>

          <div class="field">
            <label for="expense-amount">Amount</label>
            <input
              type="number"
              id="expense-amount"
              name="amount"
              placeholder="125.00"
              min="0.01"
              step="0.01"
              required
            />
          </div>

          <div class="field">
            <label for="expense-category">Category</label>
            <select id="expense-category" name="category" required>
              <option value="">Select category</option>
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Bills">Bills</option>
              <option value="Shopping">Shopping</option>
              <option value="Health">Health</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <div class="field">
            <label for="expense-date">Date</label>
            <input type="date" id="expense-date" name="date" required />
          </div>

          <button type="submit" class="primary-button">Add expense</button>
        </form>
      </section>

      <section class="panel" aria-labelledby="list-title">
        <div class="section-heading list-heading">
          <div>
            <h2 id="list-title">Expenses</h2>
            <p id="expense-count">No expenses recorded.</p>
          </div>
          <div class="filters" aria-label="Expense filters">
            <label for="filter-category">Category</label>
            <select id="filter-category">
              <option value="all">All categories</option>
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Bills">Bills</option>
              <option value="Shopping">Shopping</option>
              <option value="Health">Health</option>
              <option value="Other">Other</option>
            </select>

            <label for="filter-date">Date</label>
            <input type="date" id="filter-date" />
            <button type="button" id="clear-filters" class="ghost-button">
              Clear
            </button>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th scope="col">Expense name</th>
                <th scope="col">Category</th>
                <th scope="col">Amount</th>
                <th scope="col">Date</th>
                <th scope="col">Action</th>
              </tr>
            </thead>
            <tbody id="expense-list"></tbody>
          </table>
        </div>

        <p id="empty-state" class="empty-state">
          Add your first expense to start tracking spending.
        </p>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
